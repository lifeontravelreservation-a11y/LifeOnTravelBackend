<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life On Travel | Command Center</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #c9a84c;
      --primary-hover: #b3933d;
      --bg: #050505;
      --card-bg: #0f0f0f;
      --border: #1a1a1a;
      --border-hover: #252525;
      --text: #ffffff;
      --text-muted: #808080;
      --success: #10b981;
      --danger: #ef4444;
      --sidebar-w: 280px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      margin: 0; 
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Login Overlay */
    #login-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
      background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
    }
    .login-card {
      background: var(--card-bg); padding: 48px; border-radius: 24px;
      border: 1px solid var(--border); width: 100%; max-width: 440px;
      text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .login-card h1 { font-family: 'Outfit', sans-serif; margin-bottom: 32px; font-weight: 700; letter-spacing: -0.5px; font-size: 28px; }
    
    /* Layout */
    .sidebar {
      width: var(--sidebar-w); background: var(--card-bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 24px 0;
    }
    .main-content { flex: 1; overflow-y: auto; background: var(--bg); padding: 48px; position: relative; }
    
    .sidebar-header { padding: 0 24px 32px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .logo { display: flex; align-items: center; gap: 12px; font-family: 'Outfit'; font-weight: 700; font-size: 22px; color: var(--primary); letter-spacing: -0.5px; }
    
    #sidebar-nav { flex: 1; overflow-y: auto; padding-right: 8px; }
    .nav-item {
      padding: 12px 24px; cursor: pointer; color: var(--text-muted);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 14px;
      font-weight: 600; border-left: 4px solid transparent; margin: 2px 0;
      font-size: 14px;
    }
    .nav-item span:first-child { font-size: 18px; filter: grayscale(1) opacity(0.7); transition: inherit; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item:hover span:first-child { filter: grayscale(0) opacity(1); }
    .nav-item.active { color: var(--primary); background: rgba(201,168,76,0.08); border-left-color: var(--primary); }
    .nav-item.active span:first-child { filter: grayscale(0) opacity(1); }

    /* UI Components */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; position: sticky; top: -48px; background: var(--bg); padding: 10px 0; z-index: 10; border-bottom: 1px solid transparent; transition: all 0.3s; }
    .section-title { font-family: 'Outfit'; font-size: 36px; font-weight: 700; margin: 0; letter-spacing: -1px; }
    
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 32px; transition: border 0.3s; }
    .card:hover { border-color: var(--border-hover); }
    .card-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; color: var(--primary); display: flex; justify-content: space-between; align-items: center; font-family: 'Outfit'; }
    
    .form-group { margin-bottom: 24px; }
    label { display: block; margin-bottom: 10px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
    
    input, textarea, select {
      width: 100%; background: #000; border: 1px solid var(--border);
      padding: 14px 18px; border-radius: var(--radius-md); color: #fff;
      font-family: inherit; font-size: 15px; outline: none; transition: all 0.3s;
      border: 1.5px solid var(--border);
    }
    input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(201,168,76,0.1); }
    
    .btn {
      padding: 12px 28px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer;
      border: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; font-size: 14px;
      display: inline-flex; align-items: center; gap: 10px; justify-content: center;
    }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,168,76,0.3); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: #fff; }
    .btn-outline:hover { background: var(--border); border-color: var(--text-muted); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1.5px solid rgba(239, 68, 68, 0.2); }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* Media Upload Area */
    .upload-container { display: flex; gap: 24px; align-items: center; background: #000; padding: 16px; border-radius: var(--radius-md); border: 1.5px dashed var(--border); }
    .img-preview { 
      width: 100px; height: 100px; border-radius: var(--radius-sm); object-fit: cover;
      background: #0a0a0a; border: 1px solid var(--border); flex-shrink: 0;
    }
    .upload-controls { flex: 1; }

    /* Grid Layout for Array Items */
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 32px; }

    /* Notifications */
    #toast {
      position: fixed; bottom: 40px; right: 40px; padding: 20px 32px;
      border-radius: var(--radius-md); background: #111; border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6); z-index: 2000;
      transform: translateY(120px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-weight: 600; display: flex; align-items: center; gap: 12px;
    }
    #toast.show { transform: translateY(0); }

    /* Utilities */
    .hidden { display: none !important; }
    
    /* Blog Specific */
    .toolbar-btn { padding: 8px 12px; font-size: 12px; min-width: 40px; }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div id="login-overlay">
    <div class="login-card">
      <div class="logo" style="justify-content: center; margin-bottom: 20px;">✦ Life On Travel</div>
      <h1>Command Center</h1>
      <div class="form-group">
        <input type="password" id="admin-pass" placeholder="Enter Access Code" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width: 100%;" onclick="attemptLogin()">Grant Access</button>
      <p id="login-err" style="color: var(--danger); font-size: 14px; margin-top: 15px;" class="hidden">Invalid credentials</p>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">✦ Life On Travel</div>
      <p style="font-size: 12px; color: var(--text-muted); margin: 5px 0 0;">Management Suite</p>
    </div>
    <nav id="sidebar-nav">
      <div class="nav-item active" data-tab="hero"><span>🏠</span> Hero Section</div>
      <div class="nav-item" data-tab="destinations"><span>🗺️</span> Destinations</div>
      <div class="nav-item" data-tab="packages"><span>📦</span> Packages</div>
      <div class="nav-item" data-tab="gallery"><span>📷</span> Gallery</div>
      <div class="nav-item" data-tab="pricing"><span>💎</span> Pricing</div>
      <div class="nav-item" data-tab="stories"><span>📱</span> Web Stories</div>
      <div class="nav-item" data-tab="blogposts"><span>✍️</span> Blog Posts</div>
    </nav>
    <div style="margin-top: auto; padding: 20px 25px;">
       <button class="btn btn-outline" style="width: 100%;" onclick="logout()">Logout</button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <div class="section-header">
      <h2 class="section-title" id="active-tab-title">Hero Section</h2>
      <button class="btn btn-primary" id="master-save-btn" onclick="saveEverything()">💾 Save All</button>
    </div>

    <div id="editor-container"></div>
  </main>

  <div id="toast">Changes saved successfully!</div>

  <script>
    let siteData = {};
    let currentTab = 'hero';
    let activeBlogIndex = 0;

    // ═══════════════════════════════════════════════════════ DATA HANDLERS
    async function fetchData() {
      const container = document.getElementById('editor-container');
      container.innerHTML = '<div style="padding: 20px; color: var(--text-muted);">Synchronizing...</div>';
      try {
        const res = await fetch('/api/data');
        const data = await res.json();
        siteData = data || {};
        renderActiveTab();
      } catch (err) {
        container.innerHTML = '<div style="padding: 20px; color: var(--danger);">Failed to load data.</div>';
      }
    }

    async function saveEverything() {
      document.getElementById('master-save-btn').textContent = 'Saving...';
      try {
        const res = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(siteData)
        });
        showToast("Changes pushed live!");
      } catch (err) {
        showToast("Save failed", true);
      } finally {
        document.getElementById('master-save-btn').textContent = 'Save All Changes';
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderColor = isError ? 'var(--danger)' : 'var(--success)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function updateDeepValue(path, val) {
      const parts = path.split(/[.\[\]]/).filter(p => p !== "");
      let current = siteData;
      for (let i = 0; i < parts.length - 1; i++) {
        if (!current[parts[i]]) current[parts[i]] = {};
        current = current[parts[i]];
      }
      current[parts[parts.length - 1]] = val;
    }

    async function handleUpload(fileInput, path, index, fieldKey) {
      const file = fileInput.files[0];
      if (!file) return;
      const btn = fileInput.nextElementSibling;
      btn.textContent = 'Uploading...';
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = async () => {
        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: reader.result })
          });
          const data = await res.json();
          if (data.success) {
            updateDeepValue(`${path}[${index}].${fieldKey}`, data.url);
            showToast("Uploaded successfully!");
            renderActiveTab();
          }
        } catch (err) { alert('Upload error'); }
        finally { btn.textContent = 'Upload'; }
      };
    }

    // ═══════════════════════════════════════════════════════ UI RENDERING
    function renderActiveTab() {
      const container = document.getElementById('editor-container');
      container.innerHTML = '';
      const titleEl = document.getElementById('active-tab-title');
      const navItem = document.querySelector(`[data-tab="${currentTab}"]`);
      titleEl.textContent = navItem ? navItem.textContent.split(' ').slice(1).join(' ') : currentTab;

      const dispatch = {
        hero:         () => renderHeroEditor(container),
        destinations: () => renderDestEditor(container),
        packages:     () => renderPkgEditor(container),
        gallery:      () => renderGalleryEditor(container),
        pricing:      () => renderPricingEditor(container),
        stories:      () => renderStoriesEditor(container),
        blogposts:    () => renderBlogEditor(container),
      };
      if (dispatch[currentTab]) dispatch[currentTab]();
    }

    // ── Simple text field builder ─────────────────────────────────────────
    function createField(labelTxt, value, onChange) {
      const g = document.createElement('div');
      g.className = 'form-group';
      const isLong = value && String(value).length > 80;
      g.innerHTML = `<label>${labelTxt}</label>${isLong
        ? `<textarea>${value}</textarea>`
        : `<input type="text" value="${(value||'').toString().replace(/"/g,'&quot;')}">`}`;
      g.querySelector('input,textarea').onchange = e => onChange(e.target.value);
      return g;
    }

    // ── Upload helper for standalone file inputs ──────────────────────────
    async function handleUploadDirect(file, onSuccess) {
      if (!file) return;
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = async () => {
        try {
          const res = await fetch('/api/upload', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ image: reader.result })
          });
          const d = await res.json();
          if (d.success) { onSuccess(d.url); showToast('Uploaded!'); }
          else showToast('Upload failed', true);
        } catch { showToast('Upload error', true); }
      };
    }

    // ── Remove item from any nested array ────────────────────────────────
    function removeDeepItem(path, index) {
      if (!confirm('Delete?')) return;
      const parts = path.split(/[.\[\]]/).filter(p => p !== '');
      let cur = siteData;
      parts.forEach(p => cur = cur[p]);
      cur.splice(index, 1);
      renderActiveTab();
    }

    // ══════════════════════════════════════════════════════════════════════
    //  GALLERY EDITOR  — siteData.gallery.items[{image,alt,caption}]
    // ══════════════════════════════════════════════════════════════════════
    function renderGalleryEditor(container) {
      if (!siteData.gallery) siteData.gallery = { sectionTitle: 'Gallery', items: [] };
      if (!siteData.gallery.items) siteData.gallery.items = [];
      const items = siteData.gallery.items;

      // Section header settings
      const hCard = document.createElement('div'); hCard.className = 'card';
      hCard.innerHTML = '<div class="card-title">Gallery Settings</div>';
      hCard.appendChild(createField('Section Title', siteData.gallery.sectionTitle, v => siteData.gallery.sectionTitle = v));
      hCard.appendChild(createField('Section Eyebrow', siteData.gallery.sectionEyebrow||'', v => siteData.gallery.sectionEyebrow = v));
      container.appendChild(hCard);

      // Photo grid
      const grid = document.createElement('div');
      grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px';

      items.forEach((item, i) => {
        const c = document.createElement('div');
        c.className = 'card'; c.style.padding = '0'; c.style.overflow = 'hidden';
        c.innerHTML = `
          <div style="position:relative">
            <img src="${item.image||item.src||''}" id="gal-img-${i}"
              style="width:100%;height:180px;object-fit:cover;display:block;background:#111">
            <button class="btn btn-danger" style="position:absolute;top:8px;right:8px;padding:4px 10px;font-size:11px"
              onclick="removeDeepItem('gallery.items',${i})">✕</button>
          </div>
          <div style="padding:16px">
            <div class="form-group">
              <label>Image URL</label>
              <input type="text" value="${item.image||item.src||''}"
                onchange="updateDeepValue('gallery.items[${i}].image',this.value);document.getElementById('gal-img-${i}').src=this.value">
            </div>
            <div class="form-group">
              <input type="file" id="gal-file-${i}" class="hidden"
                onchange="handleUploadDirect(this.files[0], url=>{updateDeepValue('gallery.items[${i}].image',url);renderActiveTab();})">
              <button class="btn btn-outline" style="width:100%;font-size:12px"
                onclick="document.getElementById('gal-file-${i}').click()">📤 Upload Photo</button>
            </div>
            <div class="form-group">
              <label>Alt Text</label>
              <input type="text" value="${item.alt||''}"
                onchange="updateDeepValue('gallery.items[${i}].alt',this.value)">
            </div>
            <div class="form-group">
              <label>Caption</label>
              <input type="text" value="${item.caption||''}"
                onchange="updateDeepValue('gallery.items[${i}].caption',this.value)">
            </div>
          </div>`;
        grid.appendChild(c);
      });

      // Add new photo card
      const addCard = document.createElement('div');
      addCard.className = 'card';
      addCard.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;border-style:dashed;cursor:pointer;gap:12px';
      addCard.innerHTML = `<div style="font-size:40px;opacity:0.3">📷</div><div style="color:var(--text-muted)">Add New Photo</div>
        <input type="file" id="gal-add-file" class="hidden" accept="image/*"
          onchange="handleUploadDirect(this.files[0],url=>{siteData.gallery.items.push({image:url,alt:'',caption:''});renderActiveTab();})">
        <button class="btn btn-primary" onclick="document.getElementById('gal-add-file').click()">+ Upload Photo</button>
        <button class="btn btn-outline" onclick="siteData.gallery.items.push({image:'',alt:'',caption:''});renderActiveTab()">+ Add by URL</button>`;
      grid.appendChild(addCard);
      container.appendChild(grid);
    }

    function renderDestEditor(c) {
      if (!siteData.destinations) siteData.destinations = {};
      const s = siteData.destinations;
      if (!s.items) s.items = [];
      c.innerHTML = `<div class="card"><div class="card-title">Destinations</div></div><div class="items-grid" id="dest-g"></div>`;
      const g = document.getElementById('dest-g');
      s.items.forEach((it, i) => {
        const src = it.image || it.img || '';
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<div class="card-title">${it.title||'#'+(i+1)}<button class="btn btn-danger" style="padding:4px 10px;font-size:10px" onclick="removeDeepItem('destinations.items',${i})">✕</button></div>
          <div class="form-group"><label>Image</label><img src="${src}" id="di${i}" style="width:100%;height:150px;object-fit:cover;border-radius:8px;background:#111;margin-bottom:8px"><input value="${src}" onchange="updateDeepValue('destinations.items[${i}].image',this.value);document.getElementById('di${i}').src=this.value"><input type="file" id="df${i}" class="hidden" onchange="handleUploadDirect(this.files[0],u=>{updateDeepValue('destinations.items[${i}].image',u);renderActiveTab()})"><button class="btn btn-outline" style="width:100%;margin-top:6px;font-size:11px" onclick="document.getElementById('df${i}').click()">📤 Upload</button></div>
          <div class="form-group"><label>Title</label><input value="${it.title||''}" onchange="updateDeepValue('destinations.items[${i}].title',this.value)"></div>
          <div class="form-group"><label>Type</label><input value="${it.type||''}" onchange="updateDeepValue('destinations.items[${i}].type',this.value)"></div>
          <div class="form-group"><label>Region</label><input value="${it.region||''}" onchange="updateDeepValue('destinations.items[${i}].region',this.value)"></div>
          <div class="form-group"><label>Duration</label><input value="${it.duration||''}" onchange="updateDeepValue('destinations.items[${i}].duration',this.value)"></div>
          <div class="form-group"><label>Slug</label><input value="${it.slug||''}" onchange="updateDeepValue('destinations.items[${i}].slug',this.value)"></div>`;
        g.appendChild(d);
      });
      const btn = document.createElement('button'); btn.className='btn btn-primary'; btn.style.marginTop='20px'; btn.textContent='+ Add Destination';
      btn.onclick=()=>{s.items.push({title:'',type:'',region:'',duration:'',image:'',slug:''});renderActiveTab();}; c.appendChild(btn);
    }

    // ══════════════════════════════════════════════════════════════════════
    function renderPkgEditor(c) {
      if (!siteData.packages) siteData.packages = {};
      const s = siteData.packages;
      if (!s.items) s.items = [];
      c.innerHTML = `<div class="card"><div class="card-title">Packages</div></div><div class="items-grid" id="pkg-g"></div>`;
      const g = document.getElementById('pkg-g');
      s.items.forEach((it, i) => {
        const src = it.image || it.img || '';
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<div class="card-title">${it.title||'#'+(i+1)}<button class="btn btn-danger" style="padding:4px 10px;font-size:10px" onclick="removeDeepItem('packages.items',${i})">✕</button></div>
          <div class="form-group"><label>Image</label><img src="${src}" id="pi${i}" style="width:100%;height:150px;object-fit:cover;border-radius:8px;background:#111;margin-bottom:8px"><input value="${src}" onchange="updateDeepValue('packages.items[${i}].image',this.value);document.getElementById('pi${i}').src=this.value"><input type="file" id="pf${i}" class="hidden" onchange="handleUploadDirect(this.files[0],u=>{updateDeepValue('packages.items[${i}].image',u);renderActiveTab()})"><button class="btn btn-outline" style="width:100%;margin-top:6px;font-size:11px" onclick="document.getElementById('pf${i}').click()">📤 Upload</button></div>
          <div class="form-group"><label>Title</label><input value="${it.title||''}" onchange="updateDeepValue('packages.items[${i}].title',this.value)"></div>
          <div class="form-group"><label>Type</label><input value="${it.type||''}" onchange="updateDeepValue('packages.items[${i}].type',this.value)"></div>
          <div class="form-group"><label>Description</label><textarea onchange="updateDeepValue('packages.items[${i}].description',this.value)">${it.description||it.desc||''}</textarea></div>
          <div class="form-group"><label>Duration</label><input value="${it.duration||''}" onchange="updateDeepValue('packages.items[${i}].duration',this.value)"></div>
          <div class="form-group"><label>Group Size</label><input value="${it.groupSize||''}" onchange="updateDeepValue('packages.items[${i}].groupSize',this.value)"></div>
          <div class="form-group"><label>Difficulty</label><input value="${it.difficulty||''}" onchange="updateDeepValue('packages.items[${i}].difficulty',this.value)"></div>
          <div class="form-group"><label>Price</label><input value="${it.price||''}" onchange="updateDeepValue('packages.items[${i}].price',this.value)"></div>
          <div class="form-group"><label>Price Note</label><input value="${it.priceNote||''}" onchange="updateDeepValue('packages.items[${i}].priceNote',this.value)"></div>
          <div class="form-group"><label>Slug</label><input value="${it.slug||''}" onchange="updateDeepValue('packages.items[${i}].slug',this.value)"></div>`;
        g.appendChild(d);
      });
      const btn = document.createElement('button'); btn.className='btn btn-primary'; btn.style.marginTop='20px'; btn.textContent='+ Add Package';
      btn.onclick=()=>{s.items.push({title:'',type:'',description:'',duration:'',groupSize:'',difficulty:'',price:'',priceNote:'',image:'',slug:''});renderActiveTab();}; c.appendChild(btn);
    }

    // ══════════════════════════════════════════════════════════════════════
    function renderPricingEditor(c) {
      if (!siteData.pricing) siteData.pricing = {};
      const s = siteData.pricing;
      if (!s.plans) s.plans = [];
      c.innerHTML = `<div class="card"><div class="card-title">Pricing Plans</div></div><div class="items-grid" id="pr-g"></div>`;
      const g = document.getElementById('pr-g');
      s.plans.forEach((p, i) => {
        const feats = (p.features||[]).map(f => typeof f==='string'?f:f.text).join('\n');
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<div class="card-title">${p.name||'Plan '+(i+1)}<button class="btn btn-danger" style="padding:4px 10px;font-size:10px" onclick="removeDeepItem('pricing.plans',${i})">✕</button></div>
          <div class="form-group"><label>Name</label><input value="${p.name||''}" onchange="updateDeepValue('pricing.plans[${i}].name',this.value)"></div>
          <div class="form-group"><label>Description</label><textarea onchange="updateDeepValue('pricing.plans[${i}].description',this.value)">${p.description||p.desc||''}</textarea></div>
          <div class="form-group"><label>Currency</label><input value="${p.currency||''}" onchange="updateDeepValue('pricing.plans[${i}].currency',this.value)"></div>
          <div class="form-group"><label>Price</label><input value="${p.price||''}" onchange="updateDeepValue('pricing.plans[${i}].price',this.value)"></div>
          <div class="form-group"><label>Period</label><input value="${p.period||''}" onchange="updateDeepValue('pricing.plans[${i}].period',this.value)"></div>
          <div class="form-group"><label>Recommended?</label><select onchange="updateDeepValue('pricing.plans[${i}].recommended',this.value==='yes')"><option value="no"${p.recommended?'':' selected'}>No</option><option value="yes"${p.recommended?' selected':''}>Yes</option></select></div>
          <div class="form-group"><label>Features (one per line)</label><textarea style="height:140px" onchange="updateDeepValue('pricing.plans[${i}].features',this.value.split('\\n').filter(x=>x.trim()).map(x=>({text:x.trim(),included:true})))">${feats}</textarea></div>`;
        g.appendChild(d);
      });
      const btn = document.createElement('button'); btn.className='btn btn-primary'; btn.style.marginTop='20px'; btn.textContent='+ Add Plan';
      btn.onclick=()=>{s.plans.push({name:'',description:'',currency:'₹',price:'',period:'/person',recommended:false,features:[]});renderActiveTab();}; c.appendChild(btn);
    }

    // ══════════════════════════════════════════════════════════════════════
    function renderStoriesEditor(c) {
      if (!siteData.stories) siteData.stories = {};
      const s = siteData.stories;
      if (!s.items) s.items = [];
      c.innerHTML = `<div class="card"><div class="card-title">Web Stories</div></div><div class="items-grid" id="st-g"></div>`;
      const g = document.getElementById('st-g');
      s.items.forEach((it, i) => {
        const cover = it.coverImage || it.cover || it.image || '';
        const slides = it.slides || [];
        let slidesHtml = slides.map((sl, si) => {
          const simg = sl.image || sl.src || '';
          return `<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><img src="${simg}" style="width:50px;height:50px;object-fit:cover;border-radius:6px;background:#111"><input value="${simg}" style="font-size:11px" onchange="updateDeepValue('stories.items[${i}].slides[${si}].image',this.value)"><button class="btn btn-danger" style="padding:2px 6px;font-size:10px" onclick="removeDeepItem('stories.items[${i}].slides',${si})">✕</button></div>`;
        }).join('');
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<div class="card-title">${it.title||'Story '+(i+1)}<button class="btn btn-danger" style="padding:4px 10px;font-size:10px" onclick="removeDeepItem('stories.items',${i})">✕</button></div>
          <div class="form-group"><label>Cover Image</label><img src="${cover}" id="si${i}" style="width:100%;height:180px;object-fit:cover;border-radius:8px;background:#111;margin-bottom:8px"><input value="${cover}" onchange="updateDeepValue('stories.items[${i}].coverImage',this.value);document.getElementById('si${i}').src=this.value"><input type="file" id="sf${i}" class="hidden" onchange="handleUploadDirect(this.files[0],u=>{updateDeepValue('stories.items[${i}].coverImage',u);renderActiveTab()})"><button class="btn btn-outline" style="width:100%;margin-top:6px;font-size:11px" onclick="document.getElementById('sf${i}').click()">📤 Upload Cover</button></div>
          <div class="form-group"><label>Title</label><input value="${it.title||''}" onchange="updateDeepValue('stories.items[${i}].title',this.value)"></div>
          <div class="form-group"><label>Label</label><input value="${it.label||''}" onchange="updateDeepValue('stories.items[${i}].label',this.value)"></div>
          <div class="form-group"><label>Slides (${slides.length})</label>${slidesHtml}<button class="btn btn-outline" style="font-size:11px;margin-top:4px" onclick="if(!siteData.stories.items[${i}].slides)siteData.stories.items[${i}].slides=[];siteData.stories.items[${i}].slides.push({image:''});renderActiveTab()">+ Add Slide</button></div>`;
        g.appendChild(d);
      });
      const btn = document.createElement('button'); btn.className='btn btn-primary'; btn.style.marginTop='20px'; btn.textContent='+ Add Story';
      btn.onclick=()=>{s.items.push({title:'',label:'',coverImage:'',slides:[]});renderActiveTab();}; c.appendChild(btn);
    }

    // ═══════════════════════════════════════════════════════ BLOG HANDLERS
    function getBlogPosts() {
      // Schema Migration: Handle if siteData.blog was saved as an array
      if (Array.isArray(siteData.blog)) {
        const posts = siteData.blog;
        siteData.blog = { sectionTitle: 'From the Wild', posts: posts };
      }
      if (!siteData.blog) siteData.blog = { sectionTitle: 'From the Wild', posts: [] };
      if (!siteData.blog.posts) siteData.blog.posts = [];
      return siteData.blog.posts;
    }

    function renderBlogEditor(container) {
      const posts = getBlogPosts();
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:grid;grid-template-columns:280px 1fr;gap:32px;height:calc(100vh - 200px)';
      
      const sidebar = document.createElement('div');
      sidebar.innerHTML = `
        <div class="card" style="padding:0;overflow:hidden;height:100%;display:flex;flex-direction:column">
          <div style="padding:20px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <strong style="font-family:Outfit">Articles (${posts.length})</strong>
            <button class="btn btn-primary" style="padding:6px 12px;font-size:11px" onclick="addBlogPost()">+ New</button>
          </div>
          <div style="flex:1;overflow-y:auto">
            ${posts.map((p, i) => `
              <div onclick="activeBlogIndex=${i};renderActiveTab()" style="padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;background:${i===activeBlogIndex?'rgba(201,168,76,0.1)':'transparent'};transition:all 0.2s">
                <div style="font-size:13px;font-weight:${i===activeBlogIndex?'700':'400'};color:${i===activeBlogIndex?'var(--primary)':'var(--text)'};margin-bottom:4px">${p.title || 'Untitled Article'}</div>
                <div style="font-size:10px;color:var(--text-muted)">${p.date || 'No Date'} · ${p.category || 'General'}</div>
              </div>
            `).join('')}
          </div>
        </div>`;
      wrapper.appendChild(sidebar);

      const editorArea = document.createElement('div');
      editorArea.style.cssText = 'display:grid;grid-template-columns:1fr 1.2fr;gap:32px;overflow:hidden';

      if (posts.length > 0) {
        if (activeBlogIndex >= posts.length) activeBlogIndex = 0;
        const post = posts[activeBlogIndex];
        const idx = activeBlogIndex;

        // LEFT: Edit Panel
        const editPanel = document.createElement('div');
        editPanel.style.overflowY = 'auto';
        editPanel.innerHTML = `
          <div class="card" style="margin-bottom:0">
            <div style="display:flex;justify-content:space-between;margin-bottom:32px;align-items:center">
              <h3 style="margin:0;font-family:Outfit;font-size:24px">Studio Mode</h3>
              <button class="btn btn-danger" style="padding:8px 16px;font-size:12px" onclick="deleteBlogPost(${idx})">Delete Article</button>
            </div>

            <div class="form-group">
              <label>Cover Image</label>
              <div class="upload-container" style="flex-direction:column;align-items:stretch">
                <img src="${post.image}" style="width:100%;height:180px;object-fit:cover;border-radius:12px;margin-bottom:15px;background:#111" id="p-img-prev">
                <div style="display:flex;gap:10px">
                  <input type="text" value="${post.image}" onchange="updateDeepValue('blog.posts[${idx}].image', this.value); document.getElementById('p-img-prev').src=this.value; document.getElementById('studio-hero').style.backgroundImage='url('+this.value+')'" placeholder="Image URL">
                  <input type="file" id="up-file" class="hidden" onchange="handleUpload(this, 'blog.posts', ${idx}, 'image')">
                  <button class="btn btn-outline" style="white-space:nowrap" onclick="document.getElementById('up-file').click()">Upload</button>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>Heading / Title</label>
              <input type="text" value="${post.title}" oninput="document.getElementById('studio-title').textContent = this.value" onchange="updateDeepValue('blog.posts[${idx}].title', this.value); renderActiveTab()" style="font-size:18px;font-weight:700">
            </div>

            <div class="form-group">
              <label>Article Content</label>
              <div style="display:flex;gap:5px;margin-bottom:10px;background:#000;padding:8px;border-radius:8px;border:1px solid var(--border);position:sticky;top:0;z-index:5">
                <button class="btn btn-outline toolbar-btn" onclick="insertTag('blog-editor', 'h2')">H2</button>
                <button class="btn btn-outline toolbar-btn" onclick="insertTag('blog-editor', 'h3')">H3</button>
                <button class="btn btn-outline toolbar-btn" onclick="insertTag('blog-editor', 'p')">P</button>
                <button class="btn btn-outline toolbar-btn" onclick="insertTag('blog-editor', 'b')">B</button>
                <button class="btn btn-outline toolbar-btn" onclick="insertTag('blog-editor', 'i')">I</button>
                <button class="btn btn-outline toolbar-btn" onclick="insertTag('blog-editor', 'ul')">List</button>
                <button class="btn btn-outline toolbar-btn" onclick="insertBlogImage()">IMG</button>
              </div>
              <textarea id="blog-editor" style="height:600px;font-size:15px;line-height:1.7;font-family:'Plus Jakarta Sans'" oninput="document.getElementById('studio-body').innerHTML = this.value" onchange="updateDeepValue('blog.posts[${idx}].body', this.value)">${post.body || ''}</textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
               <div class="form-group"><label>URL Slug</label><input type="text" value="${post.slug}" onchange="updateDeepValue('blog.posts[${idx}].slug', this.value)"></div>
               <div class="form-group"><label>Category</label><input type="text" value="${post.category}" oninput="document.getElementById('studio-cat').textContent = this.value" onchange="updateDeepValue('blog.posts[${idx}].category', this.value)"></div>
               <div class="form-group"><label>Author</label><input type="text" value="${post.author || 'Life On Travel'}" onchange="updateDeepValue('blog.posts[${idx}].author', this.value)"></div>
               <div class="form-group"><label>Date</label><input type="text" value="${post.date}" onchange="updateDeepValue('blog.posts[${idx}].date', this.value)"></div>
            </div>
          </div>
        `;
        editorArea.appendChild(editPanel);

        // RIGHT: Live Preview
        const previewPanel = document.createElement('div');
        previewPanel.style.cssText = 'background:#fff;color:#1a1a1a;overflow-y:auto;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,0.5)';
        previewPanel.innerHTML = `
          <div id="studio-hero" style="height:300px;background-image:url('${post.image}');background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:40px">
            <div style="background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);padding:20px;border-radius:12px;color:#fff;width:100%">
              <span id="studio-cat" style="text-transform:uppercase;font-size:10px;letter-spacing:2px;font-weight:700;color:var(--primary)">${post.category || 'GENERAL'}</span>
              <h1 id="studio-title" style="margin:10px 0 0;font-family:Outfit;font-size:28px">${post.title || 'Untitled Post'}</h1>
            </div>
          </div>
          <div id="studio-body" style="padding:50px;font-family:'Cormorant Garamond', serif;font-size:18px;line-height:1.8;color:#333">
            ${post.body || '<p style="color:#999;text-align:center;padding:100px">Start writing to see the magic happen...</p>'}
          </div>
          <style>
            #studio-body h2 { font-family: Outfit; font-size: 24px; margin: 40px 0 20px; color: #000; border-bottom: 1px solid #eee; padding-bottom: 10px; }
            #studio-body h3 { font-family: Outfit; font-size: 20px; margin: 30px 0 15px; color: #111; }
            #studio-body p { margin-bottom: 20px; }
            #studio-body ul { margin-bottom: 20px; padding-left: 20px; }
            #studio-body li { margin-bottom: 8px; }
            #studio-body img { width: 100%; border-radius: 12px; margin: 30px 0; }
          </style>
        `;
        editorArea.appendChild(previewPanel);

      } else { 
        editorArea.innerHTML = `<div class="card" style="grid-column: span 2; text-align:center; padding:100px"><h3>No articles found. Create your first masterpiece!</h3></div>`; 
      }
      wrapper.appendChild(editorArea);
      container.appendChild(wrapper);
    }

    function addBlogPost() {
      const posts = getBlogPosts();
      posts.push({ title: 'New Post', image: '', body: '', slug: 'post-' + Date.now(), category: 'General' });
      activeBlogIndex = posts.length - 1;
      renderActiveTab();
    }

    function deleteBlogPost(idx) {
      if (!confirm('Delete post?')) return;
      getBlogPosts().splice(idx, 1);
      activeBlogIndex = 0;
      renderActiveTab();
    }

    function insertBlogImage() {
      const url = prompt('Image URL:');
      if (!url) return;
      const ta = document.getElementById('blog-editor');
      const start = ta.selectionStart;
      ta.value = ta.value.substring(0, start) + `<img src="${url}" style="width:100%;border-radius:12px;margin:20px 0" />` + ta.value.substring(start);
      ta.dispatchEvent(new Event('input'));
      ta.dispatchEvent(new Event('change'));
    }

    function insertTag(id, tag) {
      const ta = document.getElementById(id);
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const text = ta.value;
      const selected = text.substring(start, end);
      const open = `<${tag}>`, close = `</${tag}>`;
      ta.value = text.substring(0, start) + open + selected + close + text.substring(end);
      ta.dispatchEvent(new Event('change'));
    }

    // ═══════════════════════════════════════════════════════ AUTH
    function attemptLogin() {
      const password = document.getElementById('admin-pass').value;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      }).then(res => res.json()).then(data => {
        if (data.success) {
          document.getElementById('login-overlay').classList.add('hidden');
          fetchData();
        } else {
          document.getElementById('login-err').classList.remove('hidden');
        }
      });
    }

    function logout() {
      document.cookie = "admin_session=; Max-Age=0; path=/";
      location.reload();
    }

    document.getElementById('sidebar-nav').addEventListener('click', (e) => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      currentTab = item.dataset.tab;
      renderActiveTab();
    });

    if (document.cookie.includes('admin_session=')) {
      document.getElementById('login-overlay').classList.add('hidden');
      fetchData();
    }
  </script>
</body>
</html>
