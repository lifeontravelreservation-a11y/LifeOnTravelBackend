<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life In Travel - Admin Panel</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #111; color: #eee; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: #222; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    h1 { color: #fff; margin-top: 0; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #bbb; }
    input[type="password"], input[type="text"], input[type="number"], textarea { width: 100%; padding: 10px; border: 1px solid #444; background: #333; color: #fff; border-radius: 4px; box-sizing: border-box; }
    textarea { height: 80px; font-family: monospace; }
    button { background: #d4af37; color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #c5a017; }
    #login-section, #admin-section { display: none; }
    .active { display: block !important; }
    .message { margin-top: 10px; padding: 10px; border-radius: 4px; display: none; }
    .success { background: #2e7d32; color: #fff; }
    .error { background: #c62828; color: #fff; }

    /* Layout for Tabs */
    .admin-layout { display: flex; gap: 20px; margin-top: 20px; align-items: flex-start; }
    .sidebar { width: 250px; background: #222; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
    .tab-btn { background: transparent; color: #ccc; text-align: left; padding: 15px; font-size: 16px; border-radius: 0; font-weight: normal; border-bottom: 1px solid #333; }
    .tab-btn:hover { background: #333; }
    .tab-btn.active-tab { background: #d4af37; color: #000; font-weight: bold; }
    .content-area { flex: 1; background: #222; padding: 20px; border-radius: 8px; }
    .tab-content { display: none; }
    .tab-content.active-content { display: block; }
  </style>
</head>
<body>

  <div class="container" id="login-section" class="active">
    <h1>Admin Login</h1>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter Admin Password">
    </div>
    <button onclick="login()">Login</button>
    <div id="login-msg" class="message"></div>
  </div>

  <div class="container" id="admin-section" style="max-width: 1200px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <h1>Site Content Editor</h1>
        <p>Manage your website sections below.</p>
      </div>
      <button id="save-all-btn" onclick="saveData()" style="font-size: 16px; padding: 15px 30px; background: #4CAF50; color: white;">Save All Changes</button>
    </div>
    <div id="save-msg" class="message"></div>

    <div class="admin-layout">
      <!-- Sidebar Tabs -->
      <div class="sidebar" id="tabs-container"></div>
      
      <!-- Content Area -->
      <div class="content-area" id="dynamic-form-container"></div>
    </div>
  </div>

  <script>
    let siteData = {};

    // Check if logged in
    const hasSession = document.cookie.includes('admin_session=');
    if (hasSession) {
      showAdmin();
    } else {
      document.getElementById('login-section').classList.add('active');
    }

    function showMsg(id, msg, isError = false) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = 'message active ' + (isError ? 'error' : 'success');
      setTimeout(() => el.classList.remove('active'), 3000);
    }

    async function login() {
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          showAdmin();
        } else {
          showMsg('login-msg', data.message || 'Login failed', true);
        }
      } catch (err) {
        showMsg('login-msg', 'Server error', true);
      }
    }

    async function showAdmin() {
      document.getElementById('login-section').classList.remove('active');
      document.getElementById('admin-section').classList.add('active');
      fetchData();
    }

    async function fetchData() {
      try {
        const res = await fetch('/api/data');
        siteData = await res.json();
        renderForm();
      } catch (err) {
        console.error('Error fetching data:', err);
        showMsg('save-msg', 'Error loading data from server', true);
      }
    }

    function renderForm() {
      const tabsContainer = document.getElementById('tabs-container');
      const contentContainer = document.getElementById('dynamic-form-container');
      
      tabsContainer.innerHTML = '';
      contentContainer.innerHTML = '';

      // Check if DB is empty (null, undefined, or empty object)
      if (!siteData || Object.keys(siteData).length === 0) {
        tabsContainer.innerHTML = '<div style="padding: 15px; color: #aaa;">No Data Found</div>';
        contentContainer.innerHTML = `
          <div style="background: #2a2a2a; padding: 30px; border-radius: 8px; border: 1px dashed #555;">
            <h3>Initialize Database</h3>
            <p>Your database is currently empty. Please paste your entire <code>data.json</code> below to set up the initial fields.</p>
            <textarea id="init-json" style="height: 300px; width: 100%; background: #111; color: #0f0; font-family: monospace; padding: 15px; border-radius: 4px; border: 1px solid #444;"></textarea>
            <button onclick="initDatabase()" style="margin-top: 20px; background: #d4af37; color: #000; padding: 10px 25px; font-weight: bold; border-radius: 4px;">Import JSON</button>
          </div>
        `;
        document.getElementById('save-all-btn').style.display = 'none';
        return;
      }

      document.getElementById('save-all-btn').style.display = 'block';
      let firstTab = true;

      for (const key in siteData) {
        if (key === '_readme' || key === '_id' || key === '__v') continue;

        // Create Tab Button
        const tabBtn = document.createElement('button');
        tabBtn.className = 'tab-btn' + (firstTab ? ' active-tab' : '');
        tabBtn.textContent = key.charAt(0).toUpperCase() + key.slice(1);
        
        // Create Tab Content Box
        const tabContent = document.createElement('div');
        tabContent.className = 'tab-content' + (firstTab ? ' active-content' : '');
        tabContent.id = 'tab-' + key;
        
        // Generate the form inside the tab
        tabContent.appendChild(createNodeObj(key, siteData[key], siteData, key));
        
        // Tab click logic
        tabBtn.onclick = () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-content'));
          tabBtn.classList.add('active-tab');
          tabContent.classList.add('active-content');
        };

        tabsContainer.appendChild(tabBtn);
        contentContainer.appendChild(tabContent);
        firstTab = false;
      }
    }

    async function initDatabase() {
      try {
        const jsonStr = document.getElementById('init-json').value;
        const parsed = JSON.parse(jsonStr);
        siteData = parsed;
        await saveData();
        renderForm();
      } catch (err) {
        alert('Invalid JSON Format. Please check your data.json content.');
      }
    }

    function createNodeObj(labelPath, obj, parentRef, keyInParent = null) {
      const wrapper = document.createElement('div');
      wrapper.style.marginBottom = '15px';
      wrapper.style.padding = '15px';
      wrapper.style.border = '1px solid #444';
      wrapper.style.borderRadius = '5px';
      wrapper.style.background = '#2a2a2a';

      const header = document.createElement('div');
      header.style.display = 'flex';
      header.style.justifyContent = 'space-between';
      header.style.alignItems = 'center';
      
      const label = document.createElement('h4');
      label.textContent = labelPath;
      label.style.margin = '0';
      label.style.color = '#d4af37';
      label.style.textTransform = 'capitalize';
      header.appendChild(label);

      // Add delete button for array items
      if (Array.isArray(parentRef) && keyInParent !== null) {
        const delBtn = document.createElement('button');
        delBtn.textContent = 'Remove';
        delBtn.style.background = '#c62828';
        delBtn.style.color = 'white';
        delBtn.style.padding = '5px 10px';
        delBtn.onclick = () => {
          if (confirm('Are you sure you want to remove this item?')) {
            parentRef.splice(keyInParent, 1);
            renderForm();
          }
        };
        header.appendChild(delBtn);
      }
      
      wrapper.appendChild(header);
      wrapper.appendChild(document.createElement('hr'));

      if (Array.isArray(obj)) {
        const gridContainer = document.createElement('div');
        gridContainer.style.display = 'grid';
        gridContainer.style.gridTemplateColumns = 'repeat(auto-fill, minmax(320px, 1fr))';
        gridContainer.style.gap = '20px';
        gridContainer.style.marginTop = '15px';

        obj.forEach((item, index) => {
          let cardTitle = item.title || item.name || item.label || item.id || `Item ${index + 1}`;
          gridContainer.appendChild(createNodeObj(cardTitle, item, obj, index));
        });
        wrapper.appendChild(gridContainer);
        
        const addBtn = document.createElement('button');
        addBtn.textContent = '+ Add New Item';
        addBtn.style.padding = '10px 20px';
        addBtn.style.marginTop = '20px';
        addBtn.style.width = '100%';
        addBtn.style.background = '#333';
        addBtn.style.border = '2px dashed #555';
        addBtn.style.color = '#ccc';
        addBtn.style.cursor = 'pointer';
        
        addBtn.onclick = () => {
          const newItem = typeof obj[0] === 'object' ? JSON.parse(JSON.stringify(obj[0])) : '';
          if (typeof newItem === 'object' && newItem.id) newItem.id = Date.now(); 
          obj.push(newItem);
          renderForm();
        };
        wrapper.appendChild(addBtn);
      } else if (typeof obj === 'object' && obj !== null) {
        for (const k in obj) {
          if (k === '_readme' || k === '_id' || k === '__v') continue;
          
          if (typeof obj[k] === 'object') {
             wrapper.appendChild(createNodeObj(k, obj[k], obj, k));
          } else {
             const fieldWrap = document.createElement('div');
             fieldWrap.style.marginBottom = '15px';
             
             const fieldLabel = document.createElement('label');
             fieldLabel.textContent = k;
             fieldLabel.style.display = 'block';
             fieldLabel.style.marginBottom = '5px';
             fieldLabel.style.color = '#bbb';
             fieldWrap.appendChild(fieldLabel);

             const isImage = k.toLowerCase().includes('image') || k.toLowerCase().includes('avatar') || (typeof obj[k] === 'string' && obj[k].startsWith('http') && (obj[k].includes('cloudinary') || obj[k].includes('imgur')));
             
             let input;
             if (typeof obj[k] === 'boolean') {
               const toggleLabel = document.createElement('label');
               toggleLabel.style.display = 'flex';
               toggleLabel.style.alignItems = 'center';
               toggleLabel.style.cursor = 'pointer';
               toggleLabel.style.background = '#1a1a1a';
               toggleLabel.style.padding = '10px';
               toggleLabel.style.borderRadius = '4px';

               input = document.createElement('input');
               input.type = 'checkbox';
               input.checked = obj[k];
               input.style.marginRight = '10px';
               input.onchange = (e) => obj[k] = e.target.checked;
               
               toggleLabel.appendChild(input);
               toggleLabel.appendChild(document.createTextNode(obj[k] ? 'Enabled' : 'Disabled'));
               input.addEventListener('change', (e) => {
                 toggleLabel.childNodes[1].textContent = e.target.checked ? 'Enabled' : 'Disabled';
               });
               fieldWrap.appendChild(toggleLabel);
             } else if (typeof obj[k] === 'number') {
               input = document.createElement('input');
               input.type = 'number';
               input.value = obj[k];
               input.style.width = '100%';
               input.style.padding = '8px';
               input.onchange = (e) => obj[k] = Number(e.target.value);
               fieldWrap.appendChild(input);
             } else {
               if (String(obj[k]).length > 60) {
                 input = document.createElement('textarea');
                 input.style.height = '80px';
               } else {
                 input = document.createElement('input');
                 input.type = 'text';
               }
               input.value = obj[k];
               input.style.width = '100%';
               input.style.padding = '8px';
               input.onchange = (e) => obj[k] = e.target.value;
               fieldWrap.appendChild(input);
             }

             if (isImage) {
                const imgPreview = document.createElement('img');
                imgPreview.src = obj[k];
                imgPreview.style.width = '100%';
                imgPreview.style.height = '150px';
                imgPreview.style.objectFit = 'cover';
                imgPreview.style.display = 'block';
                imgPreview.style.marginTop = '10px';
                imgPreview.style.borderRadius = '5px';
                
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*,video/*';
                fileInput.style.marginTop = '10px';
                
                const uploadBtn = document.createElement('button');
                uploadBtn.textContent = 'Upload & Replace';
                uploadBtn.style.marginTop = '10px';
                uploadBtn.style.background = '#4CAF50';
                uploadBtn.style.color = '#fff';
                uploadBtn.style.width = '100%';
                uploadBtn.onclick = () => uploadDirectMedia(fileInput, imgPreview, input, obj, k, uploadBtn);

                fieldWrap.appendChild(imgPreview);
                fieldWrap.appendChild(fileInput);
                fieldWrap.appendChild(uploadBtn);
             }
             wrapper.appendChild(fieldWrap);
          }
        }
      }
      return wrapper;
    }

    async function uploadDirectMedia(fileInput, imgPreview, textInput, objRef, keyStr, btn) {
      const file = fileInput.files[0];
      if (!file) return alert('Select a file first');
      
      btn.textContent = 'Uploading...';
      btn.disabled = true;

      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = async () => {
        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: reader.result })
          });
          const data = await res.json();
          if (data.success) {
            imgPreview.src = data.url;
            textInput.value = data.url;
            objRef[keyStr] = data.url;
            btn.textContent = 'Uploaded!';
            setTimeout(() => btn.textContent = 'Upload & Replace', 2000);
          } else {
            alert('Upload failed: ' + data.message);
            btn.textContent = 'Upload & Replace';
          }
        } catch (err) {
          alert('Upload error');
          btn.textContent = 'Upload & Replace';
        }
        btn.disabled = false;
      };
    }

    async function saveData() {
      const btn = document.getElementById('save-all-btn');
      btn.textContent = 'Saving...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(siteData)
        });
        
        if (res.status === 401) {
          showMsg('save-msg', 'Unauthorized. Please login again.', true);
          return;
        }
        
        const data = await res.json();
        if (data.success) {
          showMsg('save-msg', 'All changes saved successfully!');
        } else {
          showMsg('save-msg', data.message || 'Error saving data', true);
        }
      } catch (err) {
        showMsg('save-msg', 'Error: ' + err.message, true);
      } finally {
        btn.textContent = 'Save All Changes';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
