<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life In Travel | Command Center</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #d4af37;
      --primary-hover: #c5a017;
      --bg: #0a0a0a;
      --card-bg: #141414;
      --border: #222;
      --text: #eee;
      --text-muted: #888;
      --success: #10b981;
      --danger: #ef4444;
      --sidebar-w: 260px;
    }

    * { box-sizing: border-box; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      margin: 0; 
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Login Overlay */
    #login-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    .login-card {
      background: var(--card-bg); padding: 40px; border-radius: 20px;
      border: 1px solid var(--border); width: 100%; max-width: 400px;
      text-align: center;
    }
    .login-card h1 { font-family: 'Outfit', sans-serif; margin-bottom: 30px; font-weight: 700; letter-spacing: -0.5px; }
    
    /* Layout */
    .sidebar {
      width: var(--sidebar-w); background: var(--card-bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px 0;
    }
    .main-content { flex: 1; overflow-y: auto; background: var(--bg); padding: 40px; }
    
    .sidebar-header { padding: 0 25px 30px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .logo { display: flex; align-items: center; gap: 10px; font-family: 'Outfit'; font-weight: 700; font-size: 20px; color: var(--primary); }
    
    .nav-item {
      padding: 12px 25px; cursor: pointer; color: var(--text-muted);
      transition: all 0.3s; display: flex; align-items: center; gap: 12px;
      font-weight: 600; border-left: 3px solid transparent;
    }
    .nav-item:hover { color: var(--text); background: #ffffff05; }
    .nav-item.active { color: var(--primary); background: #d4af3710; border-left-color: var(--primary); }

    /* UI Components */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .section-title { font-family: 'Outfit'; font-size: 32px; font-weight: 700; margin: 0; }
    
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 25px; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    
    input, textarea, select {
      width: 100%; background: #000; border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 10px; color: #fff;
      font-family: inherit; font-size: 15px; outline: none; transition: border 0.3s;
    }
    input:focus, textarea:focus { border-color: var(--primary); }
    
    .btn {
      padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer;
      border: none; transition: all 0.3s; font-family: inherit; font-size: 14px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; }
    .btn-outline:hover { background: var(--border); }
    .btn-danger { background: #ef444420; color: var(--danger); border: 1px solid #ef444440; }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* Media Upload Area */
    .upload-container { display: flex; gap: 20px; align-items: flex-start; }
    .img-preview { 
      width: 120px; height: 120px; border-radius: 12px; object-fit: cover;
      background: #000; border: 1px solid var(--border);
    }
    .upload-controls { flex: 1; }

    /* Grid Layout for Array Items */
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }

    /* Notifications */
    #toast {
      position: fixed; bottom: 30px; right: 30px; padding: 16px 30px;
      border-radius: 12px; background: var(--card-bg); border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 2000;
      transform: translateY(100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #toast.show { transform: translateY(0); }

    /* Utilities */
    .hidden { display: none !important; }
    .loading-shimmer { background: linear-gradient(90deg, #141414 25%, #1a1a1a 50%, #141414 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div id="login-overlay">
    <div class="login-card">
      <div class="logo" style="justify-content: center; margin-bottom: 20px;">✦ Life In Travel</div>
      <h1>Command Center</h1>
      <div class="form-group">
        <input type="password" id="admin-pass" placeholder="Enter Access Code" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width: 100%;" onclick="attemptLogin()">Grant Access</button>
      <p id="login-err" style="color: var(--danger); font-size: 14px; margin-top: 15px;" class="hidden">Invalid credentials</p>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">✦ Life In Travel</div>
      <p style="font-size: 12px; color: var(--text-muted); margin: 5px 0 0;">Management Suite</p>
    </div>
    <nav id="sidebar-nav">
      <div class="nav-item active" data-tab="hero"><span>⌂</span> Home / Hero</div>
      <div class="nav-item" data-tab="stats"><span>📊</span> Vital Stats</div>
      <div class="nav-item" data-tab="destinations"><span>🗺️</span> Destinations</div>
      <div class="nav-item" data-tab="packages"><span>🏷️</span> Packages</div>
      <div class="nav-item" data-tab="pricing"><span>💎</span> Pricing</div>
      <div class="nav-item" data-tab="gallery"><span>📷</span> Gallery</div>
      <div class="nav-item" data-tab="stories"><span>📱</span> Web Stories</div>
      <div class="nav-item" data-tab="testimonials"><span>💬</span> Testimonials</div>
      <div class="nav-item" data-tab="blog"><span>✍️</span> Field Journal</div>
      <div class="nav-item" data-tab="contact"><span>📞</span> Contact Info</div>
    </nav>
    <div style="margin-top: auto; padding: 20px 25px;">
       <button class="btn btn-outline" style="width: 100%;" onclick="logout()">Logout</button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <div class="section-header">
      <h2 class="section-title" id="active-tab-title">Hero Section</h2>
      <button class="btn btn-primary" id="master-save-btn" onclick="saveEverything()">Save All Changes</button>
    </div>

    <div id="editor-container">
      <!-- Tabs will be injected here -->
    </div>
  </main>

  <div id="toast">Changes saved successfully!</div>

  <script>
    let siteData = {};
    let currentTab = 'hero';

    // ═══════════════════════════════════════════════════════ DEFAULT STRUCTURE
    const defaultTemplate = {
      hero: {
        eyebrow: "Curated Safari Experiences",
        heading: "Where the Wild Holds Its Breath",
        sub: "Immersive journeys into Earth's last untouched jungles — crafted for the discerning explorer.",
        slides: [
          { url: "https://images.unsplash.com/photo-1516426122078-c23e76319801?w=1920&q=80" },
          { url: "https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?w=1920&q=80" }
        ]
      },
      stats: [
        { num: "1200", suffix: "+", label: "Safaris Conducted" },
        { num: "48", suffix: "", label: "Wildlife Destinations" },
        { num: "15", suffix: " yrs", label: "Expert Experience" },
        { num: "98", suffix: "%", label: "Guest Satisfaction" }
      ],
      destinations: [
        { title: "Ranthambore", desc: "The land of the Royal Bengal Tiger.", image: "https://images.unsplash.com/photo-1581852017103-68ac655037b9?w=800" }
      ],
      packages: [
        { title: "Tiger Trails", desc: "A 5-day immersive tiger safari.", image: "https://images.unsplash.com/photo-1504173010664-32509107de11?w=800" }
      ],
      pricing: [
        { name: "Explorer", price: "999", features: ["Naturalist Guide", "Stay included"] }
      ],
      gallery: [
        { url: "https://images.unsplash.com/photo-1516426122078-c23e76319801?w=800" }
      ],
      stories: [
        { title: "Wild Mornings", image: "https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?w=400", slides: [] }
      ],
      testimonials: [
        { quote: "Best safari of my life!", author: "John Doe", avatar: "https://i.pravatar.cc/150?u=1" }
      ],
      blog: [
        { title: "Tracking Tigers", excerpt: "How we track the elusive cats...", image: "https://images.unsplash.com/photo-1581852017103-68ac655037b9?w=800", link: "#" }
      ],
      contact: {
        whatsapp: "919999999999",
        phone: "+91 99999 99999",
        email: "hello@lifeintravel.com",
        location: "Mumbai, India",
        social: {
          instagram: "#",
          facebook: "#",
          youtube: "#"
        }
      }
    };

    // ═══════════════════════════════════════════════════════ AUTH
    function checkAuth() {
      if (document.cookie.includes('admin_session=')) {
        document.getElementById('login-overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('login-overlay').classList.add('hidden'), 500);
        fetchData();
      }
    }

    async function attemptLogin() {
      const password = document.getElementById('admin-pass').value;
      const btn = document.querySelector('.login-card .btn');
      btn.textContent = 'Verifying...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          // Immediately hide overlay and load data
          document.getElementById('login-overlay').style.opacity = '0';
          setTimeout(() => {
            document.getElementById('login-overlay').classList.add('hidden');
            fetchData();
          }, 500);
        } else {
          document.getElementById('login-err').classList.remove('hidden');
          btn.textContent = 'Grant Access';
        }
      } catch(err) {
        alert('Server Error during login');
        btn.textContent = 'Grant Access';
      }
    }

    function logout() {
      document.cookie = "admin_session=; Max-Age=0; path=/";
      location.reload();
    }

    // ═══════════════════════════════════════════════════════ DATA HANDLERS
    async function fetchData() {
      const container = document.getElementById('editor-container');
      container.innerHTML = '<div style="padding: 20px; color: var(--text-muted);">Synchronizing with database...</div>';
      
      try {
        const res = await fetch('/api/data');
        if (!res.ok) throw new Error('Fetch failed');
        
        const data = await res.json();
        
        // If DB is empty, use the template
        if (!data || Object.keys(data).length === 0) {
          console.log('Database empty, initializing with default template...');
          siteData = JSON.parse(JSON.stringify(defaultTemplate));
          // Save the default template to DB so it persists
          await saveEverything(true);
        } else {
          siteData = data;
        }
        
        renderActiveTab();
      } catch (err) {
        console.error('Fetch Error:', err);
        container.innerHTML = '<div style="padding: 20px; color: var(--danger);">Failed to load data. Please check if MONGODB_URI is set.</div>';
        showToast("Error loading data", true);
      }
    }

    async function saveEverything(isSilent = false) {
      if (!isSilent) document.getElementById('master-save-btn').textContent = 'Saving...';
      try {
        const res = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(siteData)
        });
        const result = await res.json();
        if (result.success && !isSilent) showToast("All changes pushed live!");
      } catch (err) {
        showToast("Save failed", true);
      } finally {
        document.getElementById('master-save-btn').textContent = 'Save All Changes';
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderColor = isError ? 'var(--danger)' : 'var(--success)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ═══════════════════════════════════════════════════════ UI RENDERING
    function renderActiveTab() {
      const container = document.getElementById('editor-container');
      container.innerHTML = '';
      
      const titleEl = document.getElementById('active-tab-title');
      const tabData = siteData[currentTab];
      
      // Update Title
      const navItem = document.querySelector(`[data-tab="${currentTab}"]`);
      titleEl.textContent = navItem ? navItem.textContent.split(' ').slice(1).join(' ') : currentTab;

      if (currentTab === 'hero') renderHero(container, tabData);
      else if (currentTab === 'contact') renderContact(container, tabData);
      else if (Array.isArray(tabData)) renderArrayList(container, tabData, currentTab);
    }

    function renderHero(container, data) {
      const html = `
        <div class="card">
          <div class="card-title">Main Content</div>
          <div class="form-group">
            <label>Eyebrow Text</label>
            <input type="text" value="${data.eyebrow}" onchange="siteData.hero.eyebrow = this.value">
          </div>
          <div class="form-group">
            <label>Main Heading</label>
            <textarea onchange="siteData.hero.heading = this.value">${data.heading}</textarea>
          </div>
          <div class="form-group">
            <label>Subheading</label>
            <textarea onchange="siteData.hero.sub = this.value">${data.sub}</textarea>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Background Carousel Slides</div>
          <div class="items-grid" id="hero-slides-container"></div>
          <button class="btn btn-outline" style="margin-top: 20px;" onclick="addItem('hero', 'slides')">+ Add New Slide</button>
        </div>
      `;
      container.innerHTML = html;
      renderSubArray('hero', 'slides', 'hero-slides-container');
    }

    function renderContact(container, data) {
       const html = `
        <div class="card">
          <div class="card-title">Contact Information</div>
          <div class="form-group">
            <label>WhatsApp Number (Digits only)</label>
            <input type="text" value="${data.whatsapp}" onchange="siteData.contact.whatsapp = this.value">
          </div>
          <div class="form-group">
            <label>Display Phone</label>
            <input type="text" value="${data.phone}" onchange="siteData.contact.phone = this.value">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="text" value="${data.email}" onchange="siteData.contact.email = this.value">
          </div>
          <div class="form-group">
            <label>Office Location</label>
            <input type="text" value="${data.location}" onchange="siteData.contact.location = this.value">
          </div>
        </div>
        <div class="card">
          <div class="card-title">Social Media Links</div>
          <div class="form-group">
            <label>Instagram URL</label>
            <input type="text" value="${data.social.instagram}" onchange="siteData.contact.social.instagram = this.value">
          </div>
          <div class="form-group">
            <label>Facebook URL</label>
            <input type="text" value="${data.social.facebook}" onchange="siteData.contact.social.facebook = this.value">
          </div>
          <div class="form-group">
            <label>YouTube URL</label>
            <input type="text" value="${data.social.youtube}" onchange="siteData.contact.social.youtube = this.value">
          </div>
        </div>
      `;
      container.innerHTML = html;
    }

    function renderArrayList(container, data, tabKey) {
      const grid = document.createElement('div');
      grid.className = 'items-grid';
      
      data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        
        let fieldsHtml = '';
        for (const key in item) {
          if (key === 'id') continue;
          
          const isImg = key.toLowerCase().includes('image') || key.toLowerCase().includes('url') || key.toLowerCase().includes('avatar');
          
          if (isImg) {
            fieldsHtml += `
              <div class="form-group">
                <label>${key}</label>
                <div class="upload-container">
                  <img src="${item[key]}" class="img-preview" id="prev-${tabKey}-${index}-${key}">
                  <div class="upload-controls">
                    <input type="text" value="${item[key]}" onchange="siteData.${tabKey}[${index}].${key} = this.value" id="input-${tabKey}-${index}-${key}">
                    <input type="file" class="hidden" id="file-${tabKey}-${index}-${key}" onchange="handleUpload(this, '${tabKey}', ${index}, '${key}')">
                    <button class="btn btn-outline" style="margin-top: 10px; width: 100%;" onclick="document.getElementById('file-${tabKey}-${index}-${key}').click()">Upload New Image</button>
                  </div>
                </div>
              </div>
            `;
          } else if (key === 'features' && Array.isArray(item[key])) {
             fieldsHtml += `<div class="form-group"><label>Features (One per line)</label><textarea onchange="siteData.${tabKey}[${index}].${key} = this.value.split('\\n')">${item[key].join('\n')}</textarea></div>`;
          } else {
             fieldsHtml += `<div class="form-group"><label>${key}</label><textarea onchange="siteData.${tabKey}[${index}].${key} = this.value">${item[key]}</textarea></div>`;
          }
        }

        card.innerHTML = `
          <div class="card-title">
            ${item.title || item.name || item.label || 'Item ' + (index + 1)}
            <button class="btn btn-danger" style="padding: 5px 10px; font-size: 10px;" onclick="removeItem('${tabKey}', ${index})">Remove</button>
          </div>
          ${fieldsHtml}
        `;
        grid.appendChild(card);
      });

      container.appendChild(grid);
      
      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-outline';
      addBtn.style.marginTop = '20px';
      addBtn.textContent = '+ Add New Item to ' + tabKey;
      addBtn.onclick = () => addItem(tabKey);
      container.appendChild(addBtn);
    }

    function renderSubArray(parentKey, subKey, containerId) {
      const container = document.getElementById(containerId);
      const data = siteData[parentKey][subKey];
      container.innerHTML = '';
      
      data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-title">Slide ${index + 1} <button class="btn btn-danger" style="padding: 5px 10px;" onclick="removeItem('${parentKey}', ${index}, '${subKey}')">✕</button></div>
          <div class="upload-container">
            <img src="${item.url}" class="img-preview" id="prev-${parentKey}-${subKey}-${index}">
            <div class="upload-controls">
              <input type="text" value="${item.url}" onchange="siteData.${parentKey}.${subKey}[${index}].url = this.value" id="input-${parentKey}-${subKey}-${index}">
              <input type="file" class="hidden" id="file-${parentKey}-${subKey}-${index}" onchange="handleUpload(this, '${parentKey}', ${index}, 'url', '${subKey}')">
              <button class="btn btn-outline" style="margin-top: 10px; width: 100%;" onclick="document.getElementById('file-${parentKey}-${subKey}-${index}').click()">Change Slide Image</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // ═══════════════════════════════════════════════════════ LOGIC
    function addItem(tabKey, subKey = null) {
      const target = subKey ? siteData[tabKey][subKey] : siteData[tabKey];
      const template = JSON.parse(JSON.stringify(target[0]));
      // Clear values in template
      for(let k in template) if(typeof template[k] === 'string') template[k] = '';
      target.push(template);
      renderActiveTab();
    }

    function removeItem(tabKey, index, subKey = null) {
      if(!confirm('Are you sure?')) return;
      if(subKey) siteData[tabKey][subKey].splice(index, 1);
      else siteData[tabKey].splice(index, 1);
      renderActiveTab();
    }

    async function handleUpload(fileInput, tabKey, index, fieldKey, subKey = null) {
      const file = fileInput.files[0];
      if (!file) return;

      const btn = fileInput.nextElementSibling;
      btn.textContent = 'Uploading...';
      btn.disabled = true;

      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = async () => {
        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: reader.result })
          });
          const data = await res.json();
          if (data.success) {
            if(subKey) siteData[tabKey][subKey][index][fieldKey] = data.url;
            else siteData[tabKey][index][fieldKey] = data.url;
            
            showToast("Image uploaded to Cloudinary!");
            renderActiveTab();
          } else {
            alert('Upload failed: ' + data.message);
          }
        } catch (err) {
          alert('Upload error');
        } finally {
          btn.textContent = 'Upload New Image';
          btn.disabled = false;
        }
      };
    }

    // ═══════════════════════════════════════════════════════ EVENT LISTENERS
    document.getElementById('sidebar-nav').addEventListener('click', (e) => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      currentTab = item.dataset.tab;
      renderActiveTab();
    });

    // Check auth on load
    checkAuth();
  </script>
</body>
</html>
